<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Think-Pod 🎙️</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="start-screen" class="screen">
    <div class="container">
      <h1>🎙️ Think-Pod</h1>
      <p class="subtitle">A thinking exercise disguised as a podcast</p>

      <div class="form-group">
        <label for="podcaster-select">Choose your interviewer</label>
        <select id="podcaster-select" onchange="onPodcasterChange()">
          <option value="" disabled>Loading...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="guest-name">Your name</label>
        <input type="text" id="guest-name" placeholder="Kush" value="">
      </div>

      <div class="form-group">
        <label for="topic">What do you want to talk about?</label>
        <input type="text" id="topic" placeholder="early stage startups, AI, the future...">
      </div>

      <button id="start-btn" onclick="startSession()">Start Interview with Chris Williamson</button>
    </div>
  </div>

  <div id="interview-screen" class="screen" style="display:none">
    <div class="container wide">
      <div class="header">
        <div class="header-left">
          <img id="host-avatar" class="host-avatar" src="" alt="">
          <h2 id="host-title">🎙️ Podcast</h2>
        </div>
        <button id="end-btn" onclick="endSession()">End Session</button>
      </div>

      <div class="layout">
        <div class="main-panel">
          <div class="controls card">
            <div class="toggle-row">
              <label class="toggle">
                <input type="checkbox" id="text-only-toggle" onchange="toggleTextOnly()">
                <span class="toggle-slider"></span>
              </label>
              <span id="text-only-label" class="toggle-label">Voice enabled</span>
            </div>
            <div id="status" class="status">Waiting...</div>

            <button
              id="talk-btn"
              class="talk-button"
              onmousedown="startRecording()"
              onmouseup="stopRecording()"
              ontouchstart="startRecording()"
              ontouchend="stopRecording()"
              disabled
            >
              🎤 Hold to Talk
            </button>

            <div class="text-fallback">
              <label for="text-input">Or type instead</label>
              <div class="text-row">
                <textarea id="text-input" rows="3" placeholder="Type your response here..."></textarea>
                <button id="send-btn" class="send-btn" onclick="sendText()" disabled>Send</button>
              </div>
            </div>

            <div id="latency" class="latency"></div>
          </div>
        </div>

        <div class="transcript-panel card">
          <div class="transcript-header">
            <h3>Conversation Transcript</h3>
            <button class="small-btn" onclick="downloadTranscript()">Download</button>
          </div>
          <div id="transcript" class="transcript"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="end-screen" class="screen" style="display:none">
    <div class="container">
      <h2>Session Complete 🎉</h2>
      <div id="summary"></div>
      <button onclick="location.reload()">Start New Session</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
